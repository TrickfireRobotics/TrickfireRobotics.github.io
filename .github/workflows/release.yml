name: Release

on:
    push:
        branches: [main]

permissions:
    contents: write
    issues: write
    pull-requests: write
    id-token: write

concurrency:
    group: release
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: true

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: latest

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  registry-url: "https://registry.npmjs.org"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run checks
              run: pnpm check

            - name: Run tests
              run: pnpm test

            - name: Build
              run: pnpm build

            - name: Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: npx semantic-release
