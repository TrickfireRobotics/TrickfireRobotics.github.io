name: Framework Release

on:
    push:
        branches: [main]
        paths:
            - ".github/workflows/release.yml"
            - "framework/**"
            - "internal/**"
            - "scaffold/**"
            - "tsup.config.ts"
            - "vitest.config.ts"
            - "tsconfig.cli.json"
            - "release.config.cjs"
    workflow_dispatch: {}

permissions:
    contents: write
    issues: write
    pull-requests: write
    id-token: write

concurrency:
    group: framework-release
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0
                  persist-credentials: true

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: latest

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  registry-url: "https://registry.npmjs.org"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run ESLint
              run: pnpm exec eslint framework scaffold tsup.config.ts vitest.config.ts release.config.cjs

            - name: Run Prettier check
              run: pnpm exec prettier --check framework internal scaffold tsup.config.ts vitest.config.ts release.config.cjs package.json

            - name: Run TypeScript check
              run: pnpm exec tsc --noEmit -p tsconfig.cli.json

            - name: Run tests
              run: pnpm test

            - name: Build
              run: pnpm framework:build

            - name: Generate token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.GH_APP_ID }}
                  private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

            - name: Release
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
              run: npx semantic-release
