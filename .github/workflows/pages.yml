name: Deploy GitHub Pages

on:
    push:
        branches: [main]
        paths-ignore:
            - "framework/**"
            - "internal/**"
            - "scaffold/**"
            - "tsup.config.ts"
            - "vitest.config.ts"
            - "tsconfig.cli.json"
            - "release.config.cjs"
    workflow_dispatch:
    schedule:
        # Portal repo discovery (website/data/fetchRepos.ts) depends on other repos' docs
        # sites being published, not just this repo's own file changes, so re-run daily to
        # pick up newly-published repos without needing a commit here.
        - cron: "17 9 * * *"

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: latest

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - uses: actions/configure-pages@v6

            - name: Build Astro site
              run: pnpm website:build
              env:
                  # Raises fetchRepos.ts's GitHub API rate limit from 60/hr (unauthenticated)
                  # to 1000/hr - matters most on the daily schedule trigger above, which runs
                  # unattended with no PR/push to correlate failures against.
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - uses: actions/upload-pages-artifact@v5
              with:
                  path: dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v5
