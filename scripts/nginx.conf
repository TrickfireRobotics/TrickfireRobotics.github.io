# TrickFire Robotics Docs — nginx config
# TLS is handled by the Cloudflare tunnel; nginx only listens on localhost.
#
# Copy to: /etc/nginx/sites-available/trickfire-docs
# Enable:  ln -s /etc/nginx/sites-available/trickfire-docs /etc/nginx/sites-enabled/
# Test:    nginx -t
# Reload:  nginx -s reload

server {
    listen 127.0.0.1:80;
    server_name localhost;

    root /home/trickfire/docs/build;
    index index.html;

    # Docusaurus SPA routing
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Immutable cache for content-hashed static assets
    location ~* \.(js|css|woff2|woff|ttf|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Short cache for HTML pages
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
