# TrickFire Robotics Docs — nginx config
# Copy to: /etc/nginx/sites-available/trickfire-docs
# Enable: ln -s /etc/nginx/sites-available/trickfire-docs /etc/nginx/sites-enabled/
# Test:   nginx -t
# Reload: nginx -s reload
#
# Requires a TLS cert — get one with:
#   certbot --nginx -d docs.trickfirerobotics.com

server {
    listen 80;
    server_name docs.trickfirerobotics.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name docs.trickfirerobotics.com;

    ssl_certificate     /etc/letsencrypt/live/docs.trickfirerobotics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.trickfirerobotics.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root /srv/trickfire-docs/build;
    index index.html;

    # Docusaurus SPA routing
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Immutable cache for content-hashed static assets
    location ~* \.(js|css|woff2|woff|ttf|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Short cache for HTML pages (Docusaurus rebuilds change hashes)
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
